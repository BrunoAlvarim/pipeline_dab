# This is a Databricks asset bundle definition for pipeline_dab.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: pipeline_dab
  uuid: cab29ef4-7e9f-46ae-8650-c8845cb91987

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
# variables:
#   catalog:
#     description: The catalog to use
#   schema:
#     description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405604848774129.9.azuredatabricks.net

  prod:
    mode: production
    workspace:
      host: https://adb-7405610906642851.11.azuredatabricks.net
      root_path: /Workspace/.bundle/${bundle.name}/${bundle.target}

    resources: #agenda o job apenas em ambiente de produção
      jobs:
        pipeline_dab_job:
          schedule:
            quartz_cron_expression: "0 0 12 * * ?"
            timezone_id: "America/Sao_Paulo"
            pause_status: UNPAUSED

    permissions:
      - user_name: brunoalvarim1@gmail.com
        level: CAN_MANAGE
